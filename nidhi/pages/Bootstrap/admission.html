<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admission - The Learning Curve</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
    <a class="navbar-brand" href="index.html">Smart Coaching</a>
    <ul class="navbar-nav ms-auto">
    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
    <li class="nav-item"><a class="nav-link active" href="courses.html">Courses</a></li>
    <li class="nav-item"><a class="nav-link" href="admission.html">Admission</a></li>
    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
    </ul>
    </div>
    </nav>

<!-- Header -->
<section class="bg-primary text-white text-center py-4">
  <h2 class="fw-bold">Admission Form</h2>
  <p>Fill the details to enroll in your desired course</p>
</section>

<!-- Form Section start-->
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow border-0">
        <div class="card-body p-4">

          <h4 class="text-center mb-4 fw-bold">Apply Now</h4>

          <form>

            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Phone Number</label>
              <input type="tel" class="form-control" placeholder="Enter phone number" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Select Course</label>
              <select class="form-select">
                <option>Science Coaching</option>
                <option>Computer Classes</option>
                <option>Competitive Exams</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Message</label>
              <textarea class="form-control" rows="3" placeholder="Any query..."></textarea>
            </div>
            <!--form section end-->

            <!--button Modal -->
            <button type="button" class="btn btn-success w-100" data-bs-toggle="modal" data-bs-target="#successModal">
              Submit Application
            </button>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="successModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">

    <div class="modal-content text-center">

      <div class="modal-header bg-success text-white">
        <h5 class="modal-title">Admission Successful</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <h4 class="text-success">🎉 Welcome!</h4>
        <p>Your application has been submitted successfully.</p>
        <p>Our team will contact you soon.</p>
      </div>

      <div class="modal-footer justify-content-center">
        <a href="home.html" class="btn btn-primary">Go Home</a>
      </div>

    </div>

  </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3">
  <p class="mb-0">© 2026 The Learning Curve</p>
</footer>

</body>
</html>
