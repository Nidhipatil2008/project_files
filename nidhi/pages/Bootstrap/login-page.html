<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--css link-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--js link-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
<div class="container-fluid vh=100 d-flex justify-content-center align-items-center row">
    <div class="card p-4 shadow col-md-5 w-50">
        <h3 class="text-center mb-3 fw-bold" >Login</h3>

        <form>
                   <!--username-->
                    <div class="mb-3">
                        <label class="form-label">username</label>
                        <input class="form-control" type="text" placeholder="Enter username">
                    </div>

                    <!--password-->
                    <div class="mb-3">
                        <label class="form-label">password</label>
                        <input class="form-control" type="password" placeholder="Enter your password">
                    </div>

                    <!--Forgot-->
                    <div class="mb-3">
                        <label class="form-label text-end w-100 text-primary">Forgot password</label>
                    </div>

                    <!--button-->
                    <div class="d-grid">
                        <button class="btn btn-success" type="submit">login</button>
                    </div>
                    <!--sign up-->
                    <div class="mb-3">
                       <div class="text-center w-100">Dont't have an account?</div>
                       <label class="form-label text-center text-primary w-100">sign up</label>
                    </div>                  
        </form>
    </div>
</div>
</body>

</html>
