<body>
    <div class="container">
        <span id="display" class=" display fw-bold"></span>
    </div>
    <button class="btn bg-primary text-white" onclick="studentAdd()">Push</button>
    <button class="btn bg-secondary text-white" onclick="studentRemove()">Pop</button>
    <button class="btn bg-primary text-white" onclick="frontAdd()">shift</button>
    <button class="btn bg-secondary text-white" onclick="frontRemove()">unshift</button>
    <script>
       
         /*- push pop-*/
        let students = ["Kitty", "Don", "son"]
        let display = students;
        document.getElementById("display").innerHTML = display;


        function studentAdd(){
            let student = prompt();
            students.push(student)
            document.getElementById("display").innerHTML = display;

        }
         function studentRemove(){
            students.pop();
           document.getElementById("display").innerHTML = display;
        }
        function frontAdd(){
            let student = prompt();
            students.unshift(student);
            document.getElementById("display").innerHTML = display;
        }
        function frontRemove(){
            students.shift()
            document.getElementById("display").innerHTML = display;
        }
