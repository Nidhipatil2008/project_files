<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        .container {
            height: 100vh;
            width: 100vw;
            background-color: antiquewhite;
            text-align: center;
            margin-top: 20%;
            justify-content: space-between;

        }

        .cards {
            height: 200px;
            width: 500px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;


        }

        .card-1 {
            width: 350px;
            height: 500px;
            background-color: rgb(247, 244, 240);
            border-radius: 10%;

        }

        .card-2 {
            width: 350px;
            height: 500px;
            background-color: rgb(246, 244, 242);
            border-radius: 10%;
        }

        .card-3 {
            width: 350px;
            height: 500px;
            background-color: rgb(239, 234, 228);
            border-radius: 10%;

        }

        button {
            width: 250px;
            height: 50px;
            background-color: black;
            color: white;
            border-radius: 10%;

        }
    </style>

</head>

<body>
    <div class="container">
        <h1 style="text-align: center; color: black;">🔥Trending Sneakers Collection</h1>
        <h3 style="text-align: center; color: black;">below the latest style with comfort and performance</h3>
        
        <div class="cards">
            <div class="card-1"><img
                    src="https://png.pngtree.com/png-clipart/20240901/original/pngtree-sports-shoes-png-image_15910407.png"
                    height="200px" width="200px">
                <h4>Nike</h4>
                <h3>Dunk High "Green Satin"</h3>
                <button>buy Now</button>
            </div>
            <div class="card-2"><img
                    src="https://png.pngtree.com/png-vector/20241018/ourmid/pngtree-running-shoes-or-sneakers-on-a-transparent-background-png-image_14112954.png"
                    height="200px" width="200px">

                <h3>Runnning shoe</h3>
                <button>buy Now</button>

            </div>
            <div class="card-3"><img
                    src="https://png.pngtree.com/png-vector/20251222/ourmid/pngtree-pair-of-vibrant-red-athletic-running-shoes-on-black-png-image_18303846.webp"
                    height="200px" width="200px">
                <h4>Nike</h4>
                <h3>Air Max Sport</h3>
                <button>buy Now</button>
            </div>
        </div>
    </div>

</html>
